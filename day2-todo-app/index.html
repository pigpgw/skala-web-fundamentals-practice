<!DOCTYPE html>
<html>
  <head>
    <title>인터랙티브 할 일 관리 앱</title>
  </head>

  <body>
    <header>
      <h1>할 일 관리</h1>

      <section>
        <h2>오늘의 한마디</h2>
        <blockquote>
          <p>불러오는 중...</p>
        </blockquote>
      </section>
    </header>

    <main>
      <section>
        <h2>할 일 추가</h2>

        <form>
          <label>새로운 할 일</label>
          <input>
          <button>추가</button>
        </form>
      </section>

      <nav>
        <h2>할 일 필터</h2>

        <ul>
          <li><button>전체</button></li>
          <li><button>진행 중</button></li>
          <li><button>완료</button></li>
        </ul>
      </nav>

      <section>
        <h2>할 일 목록</h2>

        <ul>
          <li>
            <input>
            <span>할 일 내용</span>
            <button>삭제</button>
          </li>
        </ul>

        <p>할 일이 없습니다.</p>
      </section>
    </main>

    <footer>
      <p>전체 개수: <strong>0</strong></p>
      <p>완료 개수: <strong>0</strong></p>
    </footer>
  </body>
</html>
