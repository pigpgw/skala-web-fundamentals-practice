<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개발자를 위한 제품 갤러리 | SKALA 갤러리</title>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <header class="site-header">
      <p class="site-name">SKALA 갤러리</p>

      <div class="header-actions">
        <nav class="site-nav">
          <ul>
            <li><a>제품</a></li>
            <li><a>솔루션</a></li>
            <li><a>소개</a></li>
          </ul>
        </nav>

        <button class="theme-button">🌙 다크</button>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>개발자를 위한 제품 갤러리</h1>
        <p>
          기능적 미니멀리즘 프레임워크 안에서 CSS Grid 반응성과 동적 테마
          전환에 대한 탐구입니다.
        </p>
      </section>

      <section class="product-section">
        <h2>제품 목록</h2>

        <div class="product-grid">
          <article class="product-card">
            <figure>
              <img
                src="assets/images/keyboard.jpg"
              alt="흰색 책상 위에 놓인 기계식 키보드"
            >
            <figcaption>
              <div class="product-title">
                <h3>타입랩 프로 2.0</h3>
                <p class="product-price">₩245,000</p>
              </div>
              <p>저지연 기계식 스위치와 고속 응답에 최적화된 키보드입니다.</p>
              </figcaption>
            </figure>
          </article>

          <article class="product-card">
            <figure>
              <img
                src="assets/images/mouse.jpg"
                alt="검은색 책상 매트 위에 놓인 무선 마우스"
            >
            <figcaption>
              <div class="product-title">
                <h3>플로우 내비게이터</h3>
                <p class="product-price">₩116,000</p>
              </div>
              <p>빠른 탐색과 정밀한 제어를 지원하는 무선 마우스입니다.</p>
              </figcaption>
            </figure>
          </article>

          <article class="product-card">
            <figure>
              <img
                src="assets/images/headphones.jpg"
                alt="모니터 옆 거치대에 걸린 헤드폰"
            >
            <figcaption>
              <div class="product-title">
                <h3>코드포커스 ANC</h3>
                <p class="product-price">₩453,000</p>
              </div>
              <p>작업 공간의 방해 요소를 줄여주는 소음 차단 헤드폰입니다.</p>
              </figcaption>
            </figure>
          </article>

          <article class="product-card">
            <figure>
              <img
                src="assets/images/monitor.jpg"
                alt="코드 편집 화면이 열린 울트라 와이드 모니터"
            >
            <figcaption>
              <div class="product-title">
                <h3>인피니티 뷰 34</h3>
                <p class="product-price">₩1,038,000</p>
              </div>
              <p>여러 작업 창을 한눈에 볼 수 있는 울트라 와이드 모니터입니다.</p>
              </figcaption>
            </figure>
          </article>

          <article class="product-card">
            <figure>
              <img
                src="assets/images/lamp.jpg"
                alt="키보드 옆을 비추는 검은색 데스크 조명"
            >
            <figcaption>
              <div class="product-title">
                <h3>루미나 데스크</h3>
                <p class="product-price">₩156,000</p>
              </div>
              <p>일정에 따라 색온도를 조절할 수 있는 스마트 조명입니다.</p>
              </figcaption>
            </figure>
          </article>

          <article class="product-card">
            <figure>
              <img
                src="assets/images/backpack.jpg"
                alt="책상 옆에 세워진 회색 노트북 백팩"
            >
            <figcaption>
              <div class="product-title">
                <h3>넥서스 커뮤터</h3>
                <p class="product-price">₩188,000</p>
              </div>
              <p>노트북을 안전하게 보관할 수 있는 내후성 백팩입니다.</p>
              </figcaption>
            </figure>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p><small>&copy; 2026 SKALA 갤러리</small></p>
    </footer>
  </body>
</html>
