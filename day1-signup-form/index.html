<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>회원가입</h1>
    </header>

    <main>
      <form action="./result.html" method="get" class="signup-form">
        <div>
          <label for="signup-full-name">이름</label>
          <input
            id="signup-full-name"
            name="fullName"
            type="text"
            required
          />
        </div>

        <div>
          <label for="signup-login-id">아이디</label>
          <input
            id="signup-login-id"
            name="loginId"
            type="text"
            pattern="[A-Za-z0-9]{4,12}"
            required
          />
        </div>

        <div>
          <label for="signup-password">비밀번호</label>
          <input
            id="signup-password"
            name="password"
            type="password"
            minlength="8"
            required
          />
        </div>

        <div>
          <label for="signup-email">이메일</label>
          <input
            id="signup-email"
            name="email"
            type="email"
            required
          />
        </div>

        <div>
          <label for="signup-phone">전화번호</label>
          <input
            id="signup-phone"
            name="phone"
            type="tel"
            pattern="010-[0-9]{4}-[0-9]{4}"
          />
        </div>

        <fieldset>
          <legend>성별</legend>
          <div>
            <label for="signup-gender-male">
              <input
                id="signup-gender-male"
                name="gender"
                type="radio"
                value="male"
              />
              남성
            </label>
            <label for="signup-gender-female">
              <input
                id="signup-gender-female"
                name="gender"
                type="radio"
                value="female"
              />
              여성
            </label>
          </div>
        </fieldset>

        <fieldset>
          <legend>관심분야</legend>
          <div>
            <label for="signup-interest-frontend">
              <input
                id="signup-interest-frontend"
                name="interests"
                type="checkbox"
                value="frontend"
              />
              프론트엔드
            </label>
            <label for="signup-interest-backend">
              <input
                id="signup-interest-backend"
                name="interests"
                type="checkbox"
                value="backend"
              />
              백엔드
            </label>
            <label for="signup-interest-design">
              <input
                id="signup-interest-design"
                name="interests"
                type="checkbox"
                value="design"
              />
              디자인
            </label>
          </div>
        </fieldset>

        <div>
          <label for="signup-region">지역</label>
          <select id="signup-region" name="region">
            <option value="">선택해주세요.</option>
            <option value="seoul">서울</option>
            <option value="gyeonggi">경기</option>
            <option value="incheon">인천</option>
            <option value="busan">부산</option>
            <option value="gwangju">광주</option>
            <option value="other">기타</option>
          </select>
        </div>

        <div>
          <label class="signup-form-terms" for="signup-terms-accepted">
            <input
              id="signup-terms-accepted"
              name="termsAccepted"
              type="checkbox"
              required
            />
            약관 동의
          </label>
        </div>

        <button class="signup-form-submit" type="submit">회원가입</button>
      </form>
    </main>
  </body>
</html>
