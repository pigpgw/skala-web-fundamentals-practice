<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 완료</title>
  </head>
  <body>
    <header>
      <h1>회원가입 완료 페이지</h1>
    </header>

    <main>
      <table>
        <caption>
          회원가입 정보
        </caption>
        <tbody>
          <tr>
            <th scope="row">이름</th>
            <td id="result-name">홍길동</td>
          </tr>
          <tr>
            <th scope="row">아이디</th>
            <td id="result-username">hong1234</td>
          </tr>
          <tr>
            <th scope="row">비밀번호</th>
            <td id="result-password">********</td>
          </tr>
          <tr>
            <th scope="row">이메일</th>
            <td id="result-email">hong@example.com</td>
          </tr>
          <tr>
            <th scope="row">전화번호</th>
            <td id="result-phone">010-1234-5678</td>
          </tr>
          <tr>
            <th scope="row">성별</th>
            <td id="result-gender">남성</td>
          </tr>
          <tr>
            <th scope="row">관심분야</th>
            <td id="result-interests">프론트엔드, 디자인</td>
          </tr>
          <tr>
            <th scope="row">지역</th>
            <td id="result-region">광주</td>
          </tr>
          <tr>
            <th scope="row">약관 동의</th>
            <td id="result-terms">동의</td>
          </tr>
        </tbody>
      </table>
    </main>
  </body>
</html>
