<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 완료</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&amp;family=Roboto:ital,wght@0,100..900;1,100..900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <h1>회원가입 완료 페이지</h1>
    </header>

    <main class="result-content">
      <table>
        <caption>
          회원가입 정보
        </caption>
        <tbody>
          <tr>
            <th scope="row">이름</th>
            <td id="result-full-name">-</td>
          </tr>
          <tr>
            <th scope="row">아이디</th>
            <td id="result-login-id">-</td>
          </tr>
          <tr>
            <th scope="row">비밀번호</th>
            <td id="result-password">-</td>
          </tr>
          <tr>
            <th scope="row">이메일</th>
            <td id="result-email">-</td>
          </tr>
          <tr>
            <th scope="row">전화번호</th>
            <td id="result-phone">-</td>
          </tr>
          <tr>
            <th scope="row">성별</th>
            <td id="result-gender">-</td>
          </tr>
          <tr>
            <th scope="row">관심분야</th>
            <td id="result-interests">-</td>
          </tr>
          <tr>
            <th scope="row">지역</th>
            <td id="result-region">-</td>
          </tr>
          <tr>
            <th scope="row">약관 동의</th>
            <td id="result-terms-accepted">-</td>
          </tr>
        </tbody>
      </table>
    </main>

    <script src="./result.js"></script>
  </body>
</html>
